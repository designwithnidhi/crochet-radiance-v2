<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="400" height="300" rx="16" fill="#FAF7F2"/>
  <circle cx="200" cy="150" r="110" fill="#E8C9D0" opacity="0.2"/>
  
  <g transform="translate(200, 150)" filter="drop-shadow(0px 6px 8px rgba(140, 106, 93, 0.15))">
    <!-- Hanging cord -->
    <path d="M 0 -130 L 0 -40" stroke="#8C6A5D" stroke-width="4" stroke-dasharray="3,3" stroke-linecap="round"/>
    <path d="M -30 -130 L -15 -40" stroke="#8C6A5D" stroke-width="2" opacity="0.6"/>
    <path d="M 30 -130 L 15 -40" stroke="#8C6A5D" stroke-width="2" opacity="0.6"/>
    
    <!-- Wooden Ring at top -->
    <circle cx="0" cy="-120" r="12" fill="none" stroke="#8C6A5D" stroke-width="6"/>

    <!-- Plant Pot -->
    <polygon points="-30,-15 30,-15 22,25 -22,25" fill="#FFFFFF" stroke="#8C6A5D" stroke-width="2"/>
    <rect x="-34" y="-22" width="68" height="8" rx="3" fill="#D7C6E9"/>

    <!-- Plant (Succulent leaves hanging over) -->
    <path d="M -10 -20 Q -25 -40 -35 -25 Q -25 -15 -10 -20" fill="#8C8A5D"/>
    <path d="M 10 -20 Q 25 -40 35 -25 Q 25 -15 10 -20" fill="#8C8A5D"/>
    <path d="M 0 -22 Q 0 -55 12 -50 Q 8 -25 0 -22" fill="#8DA685"/>
    <path d="M -5 -22 Q -15 -50 -25 -40 Q -15 -25 -5 -22" fill="#8DA685"/>
    <path d="M 5 -22 Q 15 -50 25 -40 Q 15 -25 5 -22" fill="#8DA685"/>
    
    <!-- Hanging Vines -->
    <path d="M -20 10 Q -35 30 -25 60 Q -20 80 -30 100" fill="none" stroke="#8DA685" stroke-width="3" stroke-linecap="round"/>
    <path d="M 15 10 Q 30 35 20 70 Q 25 90 15 110" fill="none" stroke="#8DA685" stroke-width="3" stroke-linecap="round"/>
    <path d="M -2 15 Q -5 40 5 70 Q -5 95 0 120" fill="none" stroke="#8DA685" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Vine leaves -->
    <circle cx="-28" cy="45" r="5" fill="#8DA685"/>
    <circle cx="-24" cy="75" r="5" fill="#8DA685"/>
    <circle cx="26" cy="48" r="5" fill="#8DA685"/>
    <circle cx="21" cy="82" r="5" fill="#8DA685"/>
    <circle cx="2" cy="40" r="6" fill="#8DA685"/>
    <circle cx="4" cy="90" r="6" fill="#8DA685"/>

    <!-- Crochet Hanger Basket -->
    <!-- Front wraps -->
    <path d="M -34 -18 Q -40 25 -22 30 Q 0 35 22 30 Q 40 25 34 -18" fill="none" stroke="#D7C6E9" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M -26 -18 Q -30 35 0 38 Q 30 35 26 -18" fill="none" stroke="#FAF7F2" stroke-width="2" stroke-linecap="round"/>
    <!-- Bottom tassel -->
    <path d="M 0 35 L 0 75" stroke="#D7C6E9" stroke-width="6" stroke-linecap="round"/>
    <path d="M -4 35 L -8 70" stroke="#FAF7F2" stroke-width="2"/>
    <path d="M 4 35 L 8 70" stroke="#FAF7F2" stroke-width="2"/>
  </g>
</svg>
