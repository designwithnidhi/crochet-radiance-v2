<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" rx="20" fill="#FAF7F2"/>
  <circle cx="250" cy="250" r="190" fill="#E8C9D0" opacity="0.2"/>

  <g transform="translate(250, 240)" filter="drop-shadow(0px 8px 12px rgba(140, 106, 93, 0.15))">
    <!-- Kraft Gift Box (isometric/front view) -->
    <path d="M -90 -30 L 90 -30 L 70 80 L -70 80 Z" fill="#D8C3A5"/>
    <path d="M -95 -30 L 95 -30 L 85 -55 L -85 -55 Z" fill="#C5B094"/> <!-- lid top -->
    <rect x="-95" y="-30" width="190" height="15" rx="3" fill="#B49D81"/> <!-- lid rim -->

    <!-- Twine ribbon wrapped around box -->
    <!-- vertical cord -->
    <line x1="0" y1="-55" x2="0" y2="80" stroke="#8C6A5D" stroke-width="3"/>
    <!-- horizontal cord -->
    <line x1="-80" y1="20" x2="80" y2="20" stroke="#8C6A5D" stroke-width="3"/>

    <!-- Tissue paper peeking out from lid -->
    <path d="M -70 -30 Q -50 -45 -30 -30 Q -10 -42 10 -30 Q 30 -45 50 -30" fill="none" stroke="#D7C6E9" stroke-width="6" stroke-linecap="round"/>

    <!-- Small sprig of dried lavender tucked in ribbon -->
    <g transform="translate(15, -15) rotate(25)">
      <line x1="0" y1="40" x2="0" y2="-30" stroke="#8DA685" stroke-width="2"/>
      <circle cx="0" cy="-30" r="3.5" fill="#D7C6E9"/>
      <circle cx="-4" cy="-22" r="3" fill="#D7C6E9"/>
      <circle cx="4" cy="-18" r="3.5" fill="#D7C6E9"/>
      <circle cx="-4" cy="-10" r="3" fill="#D7C6E9"/>
      <circle cx="4" cy="-5" r="3" fill="#D7C6E9"/>
    </g>

    <!-- Handwritten "Thank You" Tag -->
    <g transform="translate(-40, 15) rotate(-15)">
      <rect x="-35" y="-20" width="70" height="40" rx="4" fill="#FFFFFF" stroke="#D8C3A5" stroke-width="1.5"/>
      <!-- Tag hole -->
      <circle cx="-25" cy="0" r="3" fill="#8C6A5D"/>
      <!-- Twine string to tag -->
      <path d="M -25 0 C -40 -10 -20 -15 0 -15" fill="none" stroke="#8C6A5D" stroke-width="1.5"/>
      
      <text x="5" y="-3" font-family="'Playfair Display', serif" font-size="8" font-weight="bold" fill="#8C6A5D" text-anchor="middle">thank</text>
      <text x="5" y="7" font-family="'Playfair Display', serif" font-size="8" font-weight="bold" fill="#8C6A5D" text-anchor="middle">you! 🌸</text>
    </g>
    
    <!-- Little crochet heart next to the box -->
    <g transform="translate(100, 70) rotate(15)">
      <path d="M 0 -8 C -10 -20 -25 -10 -15 5 L 0 20 L 15 5 C 25 -10 10 -20 0 -8 Z" fill="#E8C9D0"/>
      <path d="M 0 -5 C -6 -14 -18 -7 -10 4 L 0 14 L 10 4 C 18 -7 6 -14 0 -5 Z" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2,2"/>
    </g>
  </g>
</svg>
