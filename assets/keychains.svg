<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="400" height="300" rx="16" fill="#FAF7F2"/>
  <circle cx="200" cy="150" r="110" fill="#FAF7F2" opacity="0.1"/>
  <g transform="translate(200, 140)" filter="drop-shadow(0px 6px 8px rgba(140, 106, 93, 0.15))">
    <!-- Metal Ring and Chain -->
    <circle cx="0" cy="-60" r="18" fill="none" stroke="#8C6A5D" stroke-width="4.5"/>
    <path d="M 0 -42 L 0 -15" stroke="#8C6A5D" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="-30" r="6" fill="none" stroke="#8C6A5D" stroke-width="3"/>
    
    <!-- Heart Keychain -->
    <path d="M 0 -15 C -25 -40 -55 -15 -35 15 L 0 50 L 35 15 C 55 -15 25 -40 0 -15 Z" fill="#E8C9D0"/>

    <!-- Crochet border highlights for the heart -->
    <path d="M 0 -10 C -20 -32 -48 -10 -30 15 L 0 44 L 30 15 C 48 -10 20 -32 0 -10 Z" 
          fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="6,4"/>

    <!-- Small hanging flower next to the heart -->
    <g transform="translate(30, 20)">
      <line x1="-30" y1="-35" x2="0" y2="0" stroke="#8C6A5D" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="15" fill="#D7C6E9"/>
      <!-- Flower center -->
      <circle cx="0" cy="0" r="5" fill="#FAF7F2"/>
      <!-- Petals -->
      <circle cx="0" cy="-10" r="5" fill="#FAF7F2"/>
      <circle cx="0" cy="10" r="5" fill="#FAF7F2"/>
      <circle cx="-10" cy="0" r="5" fill="#FAF7F2"/>
      <circle cx="10" cy="0" r="5" fill="#FAF7F2"/>
    </g>
  </g>
</svg>
