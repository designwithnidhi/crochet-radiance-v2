<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" rx="20" fill="#FAF7F2"/>
  
  <!-- Detailed stylized crochet macro pattern background -->
  <!-- We'll make rows of overlapping scalloped waves representing stitches in Lavender and Dusty Pink -->
  <g opacity="0.85">
    <!-- Row 1 -->
    <path d="M -20 60 Q 30 10 80 60 Q 130 10 180 60 Q 230 10 280 60 Q 330 10 380 60 Q 430 10 480 60 Q 530 10 580 60" fill="none" stroke="#D7C6E9" stroke-width="24" stroke-linecap="round"/>
    <path d="M -20 60 Q 30 10 80 60 Q 130 10 180 60 Q 230 10 280 60 Q 330 10 380 60 Q 430 10 480 60 Q 530 10 580 60" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="8,8" opacity="0.6"/>

    <!-- Row 2 -->
    <path d="M -50 130 Q 0 80 50 130 Q 100 80 150 130 Q 200 80 250 130 Q 300 80 350 130 Q 400 80 450 130 Q 500 80 550 130" fill="none" stroke="#E8C9D0" stroke-width="24" stroke-linecap="round"/>
    <path d="M -50 130 Q 0 80 50 130 Q 100 80 150 130 Q 200 80 250 130 Q 300 80 350 130 Q 400 80 450 130 Q 500 80 550 130" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="8,8" opacity="0.6"/>

    <!-- Row 3 -->
    <path d="M -20 200 Q 30 150 80 200 Q 130 150 180 200 Q 230 150 280 200 Q 330 150 380 200 Q 430 150 480 200 Q 530 150 580 200" fill="none" stroke="#D7C6E9" stroke-width="24" stroke-linecap="round"/>
    <path d="M -20 200 Q 30 150 80 200 Q 130 150 180 200 Q 230 150 280 200 Q 330 150 380 200 Q 430 150 480 200 Q 530 150 580 200" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="8,8" opacity="0.6"/>

    <!-- Row 4 -->
    <path d="M -50 270 Q 0 220 50 270 Q 100 220 150 270 Q 200 220 250 270 Q 300 220 350 270 Q 400 220 450 270 Q 500 220 550 270" fill="none" stroke="#E8C9D0" stroke-width="24" stroke-linecap="round"/>
    <path d="M -50 270 Q 0 220 50 270 Q 100 220 150 270 Q 200 220 250 270 Q 300 220 350 270 Q 400 220 450 270 Q 500 220 550 270" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="8,8" opacity="0.6"/>

    <!-- Row 5 -->
    <path d="M -20 340 Q 30 290 80 340 Q 130 290 180 340 Q 230 290 280 340 Q 330 290 380 340 Q 430 290 480 340 Q 530 290 580 340" fill="none" stroke="#D7C6E9" stroke-width="24" stroke-linecap="round"/>
    <path d="M -20 340 Q 30 290 80 340 Q 130 290 180 340 Q 230 290 280 340 Q 330 290 380 340 Q 430 290 480 340 Q 530 290 580 340" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="8,8" opacity="0.6"/>

    <!-- Row 6 -->
    <path d="M -50 410 Q 0 360 50 410 Q 100 360 150 410 Q 200 360 250 410 Q 300 360 350 410 Q 400 360 450 410 Q 500 360 550 410" fill="none" stroke="#E8C9D0" stroke-width="24" stroke-linecap="round"/>
    <path d="M -50 410 Q 0 360 50 410 Q 100 360 150 410 Q 200 360 250 410 Q 300 360 350 410 Q 400 360 450 410 Q 500 360 550 410" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="8,8" opacity="0.6"/>
  </g>

  <!-- Circular overlay spotlight inside the frame -->
  <rect width="500" height="500" fill="none" stroke="#FAF7F2" stroke-width="40"/>
  <rect x="20" y="20" width="460" height="460" fill="none" stroke="#8C6A5D" stroke-width="2" opacity="0.2"/>

  <!-- Macro stitch label tag -->
  <g transform="translate(250, 250)" filter="drop-shadow(0px 6px 10px rgba(140, 106, 93, 0.2))">
    <rect x="-60" y="-20" width="120" height="40" rx="10" fill="#FFFFFF"/>
    <rect x="-56" y="-16" width="112" height="32" rx="8" fill="none" stroke="#8C6A5D" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="0" y="6" font-family="'Quicksand', sans-serif" font-size="10" font-weight="bold" fill="#8C6A5D" text-anchor="middle">PREMIUM DETAIL</text>
  </g>
</svg>
