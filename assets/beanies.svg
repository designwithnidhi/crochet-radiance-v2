<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="400" height="300" rx="16" fill="#FAF7F2"/>
  <circle cx="200" cy="150" r="110" fill="#E8C9D0" opacity="0.3"/>
  <g transform="translate(200, 160)" filter="drop-shadow(0px 6px 8px rgba(140, 106, 93, 0.15))">
    <!-- Pom Pom at top -->
    <circle cx="0" cy="-65" r="22" fill="#FAF7F2"/>
    <circle cx="-5" cy="-70" r="12" fill="#E8C9D0" opacity="0.7"/>
    <circle cx="7" cy="-60" r="14" fill="#D7C6E9" opacity="0.7"/>
    
    <!-- Beanie Main Body -->
    <path d="M -60 30 C -60 -45 -45 -60 0 -60 C 45 -60 60 -45 60 30 Z" fill="#D7C6E9"/>
    
    <!-- Ribbed Folded Rim -->
    <rect x="-66" y="20" width="132" height="24" rx="8" fill="#E8C9D0"/>

    <!-- Vertical ribbing lines on Beanie Body -->
    <path d="M -40 -40 C -35 -20 -35 0 -40 20" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M -20 -50 C -15 -25 -15 0 -20 20" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M 0 -52 C 5 -25 5 0 0 20" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M 20 -50 C 25 -25 25 0 20 20" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M 40 -40 C 45 -20 45 0 40 20" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>

    <!-- Stitch textures on the ribbed rim -->
    <line x1="-50" y1="26" x2="-50" y2="38" stroke="#FAF7F2" stroke-width="2" opacity="0.7"/>
    <line x1="-30" y1="26" x2="-30" y2="38" stroke="#FAF7F2" stroke-width="2" opacity="0.7"/>
    <line x1="-10" y1="26" x2="-10" y2="38" stroke="#FAF7F2" stroke-width="2" opacity="0.7"/>
    <line x1="10" y1="26" x2="10" y2="38" stroke="#FAF7F2" stroke-width="2" opacity="0.7"/>
    <line x1="30" y1="26" x2="30" y2="38" stroke="#FAF7F2" stroke-width="2" opacity="0.7"/>
    <line x1="50" y1="26" x2="50" y2="38" stroke="#FAF7F2" stroke-width="2" opacity="0.7"/>
  </g>
</svg>
