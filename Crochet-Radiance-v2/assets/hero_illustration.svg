<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <radialGradient id="yarnGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F3E7FC"/>
      <stop offset="60%" stop-color="#D7C6E9"/>
      <stop offset="100%" stop-color="#B8A4CC"/>
    </radialGradient>
    
    <radialGradient id="pinkGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FAF1F3"/>
      <stop offset="70%" stop-color="#E8C9D0"/>
      <stop offset="100%" stop-color="#D5A3AC"/>
    </radialGradient>

    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8C3A5"/>
      <stop offset="50%" stop-color="#8C6A5D"/>
      <stop offset="100%" stop-color="#5C453C"/>
    </linearGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#8C6A5D" flood-opacity="0.15"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes hook-bob {
      0% { transform: translate(0px, 0px); }
      50% { transform: translate(-10px, -15px); }
      100% { transform: translate(0px, 0px); }
    }
    
    @keyframes float-gentle {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    @keyframes pulse-slow {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.5; }
    }

    .crochet-hook {
      animation: hook-bob 6s ease-in-out infinite;
    }

    .main-ball {
      animation: float-gentle 8s ease-in-out infinite;
    }

    .sparkle {
      animation: pulse-slow 3s ease-in-out infinite;
      transform-origin: center;
    }
    .sparkle-1 { animation-delay: 0s; }
    .sparkle-2 { animation-delay: 1s; }
    .sparkle-3 { animation-delay: 2s; }
  </style>

  <!-- Background decorative glows -->
  <circle cx="250" cy="250" r="180" fill="#FAF7F2" opacity="0.6"/>
  <circle cx="280" cy="220" r="130" fill="#E8C9D0" opacity="0.3" filter="url(#glow)"/>
  <circle cx="180" cy="300" r="120" fill="#D7C6E9" opacity="0.3" filter="url(#glow)"/>

  <!-- Floating Crochet Hook (Gently animated via SVG internal CSS) -->
  <g class="crochet-hook" filter="url(#softShadow)">
    <!-- Hook shaft -->
    <path d="M 120 400 L 380 140 Q 395 125 385 115 Q 375 105 360 120 L 100 380 Z" fill="url(#hookGrad)"/>
    <!-- Hook point / notch -->
    <path d="M 370 130 C 378 122 390 120 395 125 C 400 130 398 142 390 150 C 382 158 375 155 372 150 C 370 146 368 140 370 130 Z" fill="url(#hookGrad)"/>
    <!-- Wooden texture lines -->
    <path d="M 200 320 C 220 300 240 282 260 262" stroke="#5C453C" stroke-width="1.5" stroke-linecap="round" opacity="0.3" fill="none"/>
    <path d="M 150 370 C 170 350 190 332 210 312" stroke="#5C453C" stroke-width="1" stroke-linecap="round" opacity="0.3" fill="none"/>
  </g>

  <!-- Large Yarn Ball -->
  <g class="main-ball" filter="url(#softShadow)" transform="translate(230, 270)">
    <!-- Yarn ball base -->
    <circle cx="0" cy="0" r="110" fill="url(#yarnGrad)"/>

    <!-- Textured overlapping wraps of yarn (curves) -->
    <path d="M -90 -45 C -45 -90 45 -90 90 -45" fill="none" stroke="#FAF1F3" stroke-width="4" opacity="0.75" stroke-linecap="round"/>
    <path d="M -105 -10 C -60 -70 60 -70 105 -10" fill="none" stroke="#D7C6E9" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M -95 40 C -45 -30 45 -30 95 40" fill="none" stroke="#FAF1F3" stroke-width="4.5" opacity="0.8" stroke-linecap="round"/>
    <path d="M -70 75 C -30 10 30 10 70 75" fill="none" stroke="#D7C6E9" stroke-width="6" stroke-linecap="round"/>

    <!-- Crossing threads in secondary direction -->
    <path d="M -45 -90 C -90 -45 -90 45 -45 90" fill="none" stroke="#FAF1F3" stroke-width="4" opacity="0.6" stroke-linecap="round"/>
    <path d="M 0 -105 C -50 -50 -50 50 0 105" fill="none" stroke="#8C6A5D" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
    <path d="M 45 -90 C 90 -45 90 45 45 90" fill="none" stroke="#FAF1F3" stroke-width="5" opacity="0.75" stroke-linecap="round"/>
    
    <!-- Diagonal wrap -->
    <path d="M -80 60 C -10 -10 60 -60 80 -60" fill="none" stroke="#FAF1F3" stroke-width="5" stroke-linecap="round"/>
    <path d="M -60 80 C 10 10 60 -50 70 -70" fill="none" stroke="#D7C6E9" stroke-width="6" stroke-linecap="round"/>
    <path d="M -90 20 C -20 -40 40 -80 60 -90" fill="none" stroke="#8C6A5D" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Smaller dusty pink yarn ball next to it -->
  <g id="small-yarn-ball" filter="url(#softShadow)" transform="translate(130, 320)">
    <circle cx="0" cy="0" r="55" fill="url(#pinkGrad)"/>
    <path d="M -45 -20 C -20 -45 20 -45 45 -20" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.8" stroke-linecap="round"/>
    <path d="M -50 -5 C -25 -30 25 -30 50 -5" fill="none" stroke="#E8C9D0" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M -40 25 C -15 -10 15 -10 40 25" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M -35 -35 C -5 -5 -5 20 -20 40" fill="none" stroke="#8C6A5D" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Winding decorative thread (representing the yarn line) -->
  <path d="M 130 320 C 100 370 60 320 30 350 C 0 380 40 420 120 430 C 200 440 260 400 300 425 C 340 450 420 430 460 380" 
        fill="none" stroke="#8C6A5D" stroke-width="3" stroke-dasharray="6,6" opacity="0.7"/>

  <!-- Sparkling magic details -->
  <g fill="#8C6A5D" opacity="0.6">
    <!-- Star 1 -->
    <path class="sparkle sparkle-1" d="M 380 200 L 383 207 L 390 210 L 383 213 L 380 220 L 377 213 L 370 210 L 377 207 Z" fill="#E8C9D0"/>
    <!-- Star 2 -->
    <path class="sparkle sparkle-2" d="M 120 160 L 122 165 L 127 167 L 122 169 L 120 174 L 118 169 L 113 167 L 118 165 Z" fill="#D7C6E9"/>
    <!-- Star 3 -->
    <path class="sparkle sparkle-3" d="M 280 100 L 284 110 L 294 114 L 284 118 L 280 128 L 276 118 L 266 114 L 276 110 Z" fill="#8C6A5D"/>
  </g>
</svg>
