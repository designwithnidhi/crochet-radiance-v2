<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="400" height="300" rx="16" fill="#FAF7F2"/>
  <circle cx="200" cy="150" r="110" fill="#D7C6E9" opacity="0.2"/>
  <g transform="translate(200, 160)" filter="drop-shadow(0px 6px 8px rgba(140, 106, 93, 0.15))">
    <!-- Flower Stems -->
    <path d="M -20 -10 L 0 80" stroke="#8DA685" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 0 -15 L -10 80" stroke="#8DA685" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M 20 -10 L -20 80" stroke="#8DA685" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Kraft Paper Wrapping Bouquet (brown paper) -->
    <path d="M -45 10 L 45 10 L 15 85 Q 0 95 -15 85 Z" fill="#D8C3A5" opacity="0.95"/>
    <path d="M -50 5 L -10 80 L -18 83 Z" fill="#C5B094"/>
    <path d="M 50 5 L 10 80 L 18 83 Z" fill="#C5B094"/>
    
    <!-- Twine Bow -->
    <circle cx="0" cy="50" r="4" fill="#8C6A5D"/>
    <path d="M -15 42 Q -8 40 0 50 Q -8 60 -15 52 Q -22 45 -15 42" fill="none" stroke="#8C6A5D" stroke-width="2"/>
    <path d="M 15 42 Q 8 40 0 50 Q 8 60 15 52 Q 22 45 15 42" fill="none" stroke="#8C6A5D" stroke-width="2"/>
    <path d="M 0 50 Q -10 65 -15 75" fill="none" stroke="#8C6A5D" stroke-width="2" stroke-linecap="round"/>
    <path d="M 0 50 Q 10 65 8 75" fill="none" stroke="#8C6A5D" stroke-width="2" stroke-linecap="round"/>

    <!-- Flowers -->
    <!-- Pink Rose (left) -->
    <g transform="translate(-25, -25)">
      <circle cx="0" cy="0" r="22" fill="#E8C9D0"/>
      <path d="M -12 -5 Q 0 -18 12 -5 Q 18 8 0 16 Q -18 8 -12 -5" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="8" fill="#D5A3AC"/>
    </g>
    
    <!-- Lavender Tulip/Flower (center) -->
    <g transform="translate(0, -45)">
      <!-- Petals -->
      <path d="M -18 15 C -25 -20 0 -35 0 15 Z" fill="#D7C6E9"/>
      <path d="M 18 15 C 25 -20 0 -35 0 15 Z" fill="#D7C6E9"/>
      <path d="M 0 15 C -12 -25 12 -25 0 15 Z" fill="#FAF1F3"/>
      <!-- Detail -->
      <circle cx="0" cy="-5" r="4" fill="#8C6A5D"/>
    </g>

    <!-- Yellow Daisy/Flower (right) -->
    <g transform="translate(25, -18)">
      <circle cx="0" cy="0" r="18" fill="#FAF7F2"/>
      <circle cx="0" cy="0" r="7" fill="#E8C9D0"/>
      <!-- petals -->
      <circle cx="-12" cy="0" r="4.5" fill="#E8C9D0"/>
      <circle cx="12" cy="0" r="4.5" fill="#E8C9D0"/>
      <circle cx="0" cy="-12" r="4.5" fill="#E8C9D0"/>
      <circle cx="0" cy="12" r="4.5" fill="#E8C9D0"/>
      <circle cx="-8" cy="-8" r="4.5" fill="#E8C9D0"/>
      <circle cx="8" cy="-8" r="4.5" fill="#E8C9D0"/>
      <circle cx="-8" cy="8" r="4.5" fill="#E8C9D0"/>
      <circle cx="8" cy="8" r="4.5" fill="#E8C9D0"/>
    </g>
  </g>
</svg>
