<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" rx="20" fill="#FAF7F2"/>
  <circle cx="250" cy="250" r="190" fill="#D7C6E9" opacity="0.15"/>
  
  <!-- Yarn coming from top left -->
  <path d="M 50 50 Q 150 80 180 180 Q 200 240 230 245" fill="none" stroke="#E8C9D0" stroke-width="4.5" stroke-linecap="round"/>
  
  <g transform="translate(250, 250)" filter="drop-shadow(0px 8px 12px rgba(140, 106, 93, 0.12))">
    <!-- Work in Progress Fabric Piece -->
    <path d="M -110 50 C -90 -20 90 -20 110 50 L 80 140 C 40 110 -40 110 -80 140 Z" fill="#E8C9D0"/>
    
    <!-- Stitch textures -->
    <path d="M -90 40 Q 0 10 90 40" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="10,8" opacity="0.8"/>
    <path d="M -80 70 Q 0 40 80 70" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="10,8" opacity="0.8"/>
    <path d="M -70 100 Q 0 70 70 100" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="10,8" opacity="0.8"/>
    
    <!-- Crochet Hook passing through a stitch loop -->
    <!-- Wooden Crochet Hook -->
    <g transform="rotate(-35, -10, 0)">
      <path d="M -150 6 L 120 6 C 130 6 138 3 138 -2 C 138 -7 125 -10 115 -10 L -150 -10 Z" fill="#8C6A5D"/>
      <!-- hook tip -->
      <path d="M 115 -10 Q 135 -10 142 -2 Q 132 12 120 6" fill="#5C453C"/>
      <!-- thumb rest indent -->
      <ellipse cx="-40" cy="-2" rx="20" ry="6" fill="#5C453C" opacity="0.3"/>
    </g>

    <!-- Loop caught on hook -->
    <path d="M -5 5 C -5 -25 25 -25 20 -2 Q 15 15 -10 8" fill="none" stroke="#E8C9D0" stroke-width="4.5"/>
    <circle cx="20" cy="-2" r="3" fill="#FAF7F2"/>

    <!-- Sparkles / Details -->
    <g fill="#8C6A5D" opacity="0.5">
      <path d="M -120 -60 L -117 -53 L -110 -50 L -117 -47 L -120 -40 L -123 -47 L -130 -50 L -123 -53 Z"/>
      <path d="M 120 -100 L 122 -95 L 127 -93 L 122 -91 L 120 -86 L 118 -91 L 113 -93 L 118 -95 Z" fill="#D7C6E9"/>
    </g>

    <!-- WIP tag -->
    <g transform="translate(60, 90) rotate(5)">
      <rect x="-40" y="-12" width="80" height="24" rx="6" fill="#D7C6E9"/>
      <text x="0" y="5" font-family="'Quicksand', sans-serif" font-size="9" font-weight="bold" fill="#8C6A5D" text-anchor="middle">STITCH BY STITCH</text>
    </g>
  </g>
</svg>
