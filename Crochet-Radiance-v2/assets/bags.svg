<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="400" height="300" rx="16" fill="#FAF7F2"/>
  <circle cx="200" cy="150" r="110" fill="#D7C6E9" opacity="0.3"/>
  <g transform="translate(200, 160)" filter="drop-shadow(0px 6px 8px rgba(140, 106, 93, 0.15))">
    <!-- Handles -->
    <path d="M -40 -35 C -40 -85 -15 -85 -15 -35" fill="none" stroke="#E8C9D0" stroke-width="8" stroke-linecap="round"/>
    <path d="M 15 -35 C 15 -85 40 -85 40 -35" fill="none" stroke="#E8C9D0" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Bag Body -->
    <path d="M -50 -35 L 50 -35 Q 60 45 45 75 Q 30 90 0 90 Q -30 90 -45 75 Q -60 45 -50 -35 Z" fill="#E8C9D0"/>

    <!-- Mesh Texture Patterns (representing crochet texture) -->
    <!-- Rows of semi-circles / grid -->
    <path d="M -45 -15 Q -30 -5 -15 -15 Q 0 -5 15 -15 Q 30 -5 45 -15" fill="none" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round"/>
    <path d="M -47 10 Q -30 20 -15 10 Q 0 20 15 10 Q 30 20 47 10" fill="none" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round"/>
    <path d="M -44 35 Q -30 45 -15 35 Q 0 45 15 35 Q 30 45 44 35" fill="none" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round"/>
    <path d="M -38 60 Q -20 70 -5 60 Q 10 70 25 60 Q 38 70 38 60" fill="none" stroke="#FAF7F2" stroke-width="3" stroke-linecap="round"/>

    <!-- Flower patch detailing on the bag -->
    <circle cx="0" cy="15" r="14" fill="#FAF7F2"/>
    <!-- flower center -->
    <circle cx="0" cy="15" r="5" fill="#8C6A5D"/>
    <!-- flower petals -->
    <circle cx="-10" cy="15" r="4" fill="#D7C6E9"/>
    <circle cx="10" cy="15" r="4" fill="#D7C6E9"/>
    <circle cx="0" cy="5" r="4" fill="#D7C6E9"/>
    <circle cx="0" cy="25" r="4" fill="#D7C6E9"/>
    <circle cx="-7" cy="8" r="4" fill="#D7C6E9"/>
    <circle cx="7" cy="8" r="4" fill="#D7C6E9"/>
    <circle cx="-7" cy="22" r="4" fill="#D7C6E9"/>
    <circle cx="7" cy="22" r="4" fill="#D7C6E9"/>
  </g>
</svg>
