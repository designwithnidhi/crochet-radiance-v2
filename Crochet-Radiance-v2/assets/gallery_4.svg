<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="500" height="500" rx="20" fill="#FAF7F2"/>
  <circle cx="250" cy="250" r="190" fill="#D7C6E9" opacity="0.15"/>

  <g transform="translate(250, 250)" filter="drop-shadow(0px 8px 12px rgba(140, 106, 93, 0.15))">
    <!-- A pile of cute amigurumi creations -->
    
    <!-- Item 1: Cute Octopus plushie (left/bottom) -->
    <g transform="translate(-70, 30)">
      <!-- Head -->
      <circle cx="0" cy="0" r="45" fill="#D7C6E9"/>
      <!-- Eyes -->
      <circle cx="-14" cy="-5" r="4" fill="#8C6A5D"/>
      <circle cx="14" cy="-5" r="4" fill="#8C6A5D"/>
      <circle cx="-13" cy="-6" r="1.2" fill="#FFFFFF"/>
      <circle cx="15" cy="-6" r="1.2" fill="#FFFFFF"/>
      <path d="M -5 8 Q 0 12 5 8" fill="none" stroke="#8C6A5D" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-20" cy="2" r="4" fill="#E8C9D0" opacity="0.8"/>
      <circle cx="20" cy="2" r="4" fill="#E8C9D0" opacity="0.8"/>
      <!-- Tentacles -->
      <circle cx="-35" cy="35" r="12" fill="#D7C6E9"/>
      <circle cx="-12" cy="40" r="12" fill="#D7C6E9"/>
      <circle cx="12" cy="40" r="12" fill="#D7C6E9"/>
      <circle cx="35" cy="35" r="12" fill="#D7C6E9"/>
    </g>

    <!-- Item 2: Cute Bee plushie (right/top) -->
    <g transform="translate(45, -20) rotate(-15)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="55" ry="40" fill="#E8C9D0"/>
      <!-- Stripes (Warm Brown) -->
      <path d="M -15 -38 C -15 -38 -5 -10 -5 0 C -5 10 -15 38 -15 38" fill="none" stroke="#8C6A5D" stroke-width="8"/>
      <path d="M 15 -38 C 15 -38 25 -10 25 0 C 25 10 15 38 15 38" fill="none" stroke="#8C6A5D" stroke-width="8"/>
      <!-- Wings -->
      <ellipse cx="-15" cy="-42" rx="14" ry="22" fill="#FFFFFF" opacity="0.85" transform="rotate(-20 -15 -42)"/>
      <ellipse cx="10" cy="-42" rx="14" ry="22" fill="#FFFFFF" opacity="0.85" transform="rotate(20 10 -42)"/>
      <!-- Face -->
      <circle cx="-32" cy="-4" r="3.5" fill="#8C6A5D"/>
      <circle cx="-16" cy="-4" r="3.5" fill="#8C6A5D"/>
      <path d="M -26 4 Q -23 7 -20 4" fill="none" stroke="#8C6A5D" stroke-width="1.5"/>
      <circle cx="-35" cy="2" r="3.5" fill="#FAF1F3" opacity="0.9"/>
      <!-- Little Stinger -->
      <polygon points="50,-4 58,0 50,4" fill="#8C6A5D"/>
    </g>

    <!-- Item 3: Cozy Flower Pot plushie (center/bottom) -->
    <g transform="translate(15, 60)">
      <!-- Pot -->
      <polygon points="-25,0 25,0 18,35 -18,35" fill="#FAF7F2" stroke="#8C6A5D" stroke-width="2"/>
      <!-- Plant soil/base -->
      <ellipse cx="0" cy="0" rx="24" ry="6" fill="#8C6A5D"/>
      <!-- Little sprout -->
      <path d="M 0 0 Q -10 -25 -2 -35 Q 8 -25 0 0" fill="#8DA685"/>
      <path d="M -1 -12 Q 10 -20 5 -30 Q -2 -15 -1 -12" fill="#8DA685"/>
      <circle cx="1" cy="-35" r="4.5" fill="#E8C9D0"/>
      <!-- Cute Face on pot -->
      <circle cx="-10" cy="18" r="2.5" fill="#8C6A5D"/>
      <circle cx="10" cy="18" r="2.5" fill="#8C6A5D"/>
      <path d="M -3 23 Q 0 25 3 23" fill="none" stroke="#8C6A5D" stroke-width="1"/>
    </g>

    <!-- Little stars of joy -->
    <g fill="#E8C9D0">
      <circle cx="-120" cy="-60" r="6"/>
      <circle cx="110" cy="110" r="5"/>
      <circle cx="120" cy="-100" r="8" fill="#D7C6E9"/>
    </g>

    <!-- Customer tag -->
    <g transform="translate(-80, -90) rotate(-5)">
      <rect x="-40" y="-12" width="80" height="24" rx="6" fill="#8C6A5D"/>
      <text x="0" y="5" font-family="'Quicksand', sans-serif" font-size="9" font-weight="bold" fill="#FAF7F2" text-anchor="middle">CUSTOM GIFT</text>
    </g>
  </g>
</svg>
