<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="400" height="300" rx="16" fill="#FAF7F2"/>
  <circle cx="200" cy="150" r="110" fill="#E8C9D0" opacity="0.3"/>
  <g transform="translate(200, 160)" filter="drop-shadow(0px 6px 8px rgba(140, 106, 93, 0.15))">
    <!-- Bear Body -->
    <ellipse cx="0" cy="30" rx="55" ry="45" fill="#D7C6E9"/>
    
    <!-- Bear Head -->
    <circle cx="0" cy="-25" r="45" fill="#D7C6E9"/>
    
    <!-- Bear Ears -->
    <circle cx="-35" cy="-60" r="16" fill="#D7C6E9"/>
    <circle cx="-35" cy="-60" r="8" fill="#E8C9D0"/>
    <circle cx="35" cy="-60" r="16" fill="#D7C6E9"/>
    <circle cx="35" cy="-60" r="8" fill="#E8C9D0"/>
    
    <!-- Bear Snout -->
    <ellipse cx="0" cy="-15" rx="15" ry="10" fill="#FAF7F2"/>
    <polygon points="-4,-17 4,-17 0,-13" fill="#8C6A5D"/>
    
    <!-- Bear Eyes -->
    <circle cx="-16" cy="-28" r="4.5" fill="#8C6A5D"/>
    <circle cx="16" cy="-28" r="4.5" fill="#8C6A5D"/>
    <!-- Eye highlights -->
    <circle cx="-14.5" cy="-29.5" r="1.5" fill="#FFFFFF"/>
    <circle cx="17.5" cy="-29.5" r="1.5" fill="#FFFFFF"/>
    
    <!-- Blush -->
    <circle cx="-28" cy="-18" r="6" fill="#E8C9D0" opacity="0.8"/>
    <circle cx="28" cy="-18" r="6" fill="#E8C9D0" opacity="0.8"/>
    
    <!-- Bear Arms -->
    <ellipse cx="-52" cy="15" rx="12" ry="18" fill="#D7C6E9" transform="rotate(30 -52 15)"/>
    <ellipse cx="52" cy="15" rx="12" ry="18" fill="#D7C6E9" transform="rotate(-30 52 15)"/>
    
    <!-- Bear Legs -->
    <ellipse cx="-30" cy="70" rx="15" ry="20" fill="#D7C6E9"/>
    <ellipse cx="30" cy="70" rx="15" ry="20" fill="#D7C6E9"/>
    
    <!-- Crochet stitches texturing -->
    <path d="M -20 -35 L -15 -35" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M 15 -35 L 20 -35" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M -10 15 Q 0 10 10 15" stroke="#8C6A5D" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M 0 25 C -5 20 -15 20 -20 25" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 10 35 C 15 30 25 30 30 35" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
</svg>
